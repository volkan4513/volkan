<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow-x: hidden;
        }

        body {
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bg-sequence {
            position: fixed;
            top: 0;
            /* Reduce width from 50% so they only occupy the side margins */
            width: 30vw;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }

        #bg-sequence-left {
            left: 0;
            /* Keeps the image anchored to the left edge so it scales correctly */
            object-position: left center;
        }

        #bg-sequence-right {
            right: 0;
            /* Keeps the image anchored to the right edge */
            object-position: right center;
        }

        .stack-wrapper {
            position: relative;
            width: 100vw;
            aspect-ratio: 1;
            cursor: default;
            overflow: hidden;
            z-index: 1;
        }


        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            filter: none;
            transform: scale(1);
            transition: transform 0.15s ease, filter 0.15s ease;
        }

        .layer.active {
            transform: scale(1.025);
            z-index: 10;
        }

        /* --- popup modal --- */
        #popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        #popup-overlay.open {
            display: flex;
        }

        #popup-inner {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }

        #popup-img {
            display: block;
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 4px;
        }

        #popup-close {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #fff;
            color: #111;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        #popup-close:hover {
            background: #ddd;
        }

        #page2-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            height: 180px;
            border: none;
            background: url('images_to_use/page2_btn_image.webp') no-repeat center / contain;
            cursor: pointer;
            z-index: 5;
        }

        @media (max-width: 768px) {
            body {
                display: block;
            }

            .bg-sequence {
                display: none;
            }

            #page2-btn {
                display: none;
            }

            .stack-wrapper {
                width: 100vw;
                aspect-ratio: 1096 / 2233;
            }
        }
    </style>
</head>

<body>

    <img id="bg-sequence-left" class="bg-sequence" alt="">
    <img id="bg-sequence-right" class="bg-sequence" alt="">

    <button id="page2-btn" onclick="window.location.href='page2.html'"></button>

    <div class="stack-wrapper" id="wrapper"></div>

    <!-- random popup modal -->
    <div id="popup-overlay">
        <div id="popup-inner">
            <button id="popup-close">✕</button>
            <img id="popup-img" src="" alt="">
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('wrapper');
        const popupOverlay = document.getElementById('popup-overlay');
        const popupImg = document.getElementById('popup-img');

        // --- animated background image sequences (left + right) ---
        // Frame filenames are listed in frames.json inside each folder
        // (directory listing doesn't work on GitHub Pages, so we can't
        // guess filenames or fetch the folder itself).
        // START/END set the first/last index (inclusive) into that list to use.
        const BG_LEFT = {
            el: document.getElementById('bg-sequence-left'),
            dir: 'images_to_use/bg_sequence_01/',
            start: 0,
            end: 9,
            fps: 5,
        };

        const BG_RIGHT = {
            el: document.getElementById('bg-sequence-right'),
            dir: 'images_to_use/bg_sequence_02/',
            start: 1,
            end: 6,
            fps: 12,
        };

        async function initBgSequence({ el, dir, start, end, fps }) {
            const res = await fetch(dir + 'frames.json');
            const filenames = await res.json();
            const frames = filenames.slice(start, end + 1).map(name => dir + name);

            if (!frames.length) return;

            let i = 0;
            el.src = frames[0];
            setInterval(() => {
                i = (i + 1) % frames.length;
                el.src = frames[i];
            }, 1000 / fps);
        }

        initBgSequence(BG_LEFT);
        initBgSequence(BG_RIGHT);

        const W = wrapper.offsetWidth;
        const H = wrapper.offsetHeight;

        // --- popup helpers ---
        let cachedPopupImages = null;

        async function getPopupImages() {
            if (cachedPopupImages) return cachedPopupImages;
            const res = await fetch('popup_random_images/');
            const html = await res.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            cachedPopupImages = [...doc.querySelectorAll('a[href]')]
                .map(a => a.getAttribute('href'))
                .filter(href => /\.(png|jpg|jpeg|webp|gif)$/i.test(href));
            return cachedPopupImages;
        }

        async function showRandomPopup() {
            const imgs = await getPopupImages();
            if (!imgs.length) return;
            const pick = imgs[Math.floor(Math.random() * imgs.length)];
            popupImg.src = 'popup_random_images/' + pick;
            popupOverlay.classList.add('open');
        }

        function closePopup() {
            popupOverlay.classList.remove('open');
            popupImg.src = '';
        }

        document.getElementById('popup-close').addEventListener('click', closePopup);
        popupOverlay.addEventListener('click', e => { if (e.target === popupOverlay) closePopup(); });

        function paintContained(ctx, img, targetW, targetH) {
            const tw = targetW ?? W, th = targetH ?? H;
            const scale = Math.min(tw / img.naturalWidth, th / img.naturalHeight);
            const w = img.naturalWidth * scale;
            const h = img.naturalHeight * scale;
            ctx.clearRect(0, 0, tw, th);
            ctx.drawImage(img, (tw - w) / 2, (th - h) / 2, w, h);
        }

        function alpha(ctx, x, y) {
            try { return ctx.getImageData(Math.round(x), Math.round(y), 1, 1).data[3]; }
            catch { return 0; }
        }

        function imgName(el) {
            return el.getAttribute('src').split('/').pop().replace(/\.[^.]+$/, '');
        }

        async function init() {
            const config = await fetch('functions_to_work.json').then(r => r.json());
            const filenames = [...(config[0]?.image_filenames ?? [])].reverse();

            const namesToLink = config[0]?.names_to_link ?? {};
            const openRandomPopup = config[0]?.open_random_popup ?? {};
            const scrollDown = config[0]?.scroll_down ?? {};

            const EXTENSIONS = ['webp', 'png', 'jpg', 'jpeg'];

            function loadWithFallback(img, name, extIndex) {
                if (extIndex >= EXTENSIONS.length) return;
                img.onerror = () => loadWithFallback(img, name, extIndex + 1);
                img.src = 'images_to_use/' + name + '.' + EXTENSIONS[extIndex];
            }

            filenames.forEach(name => {
                const img = document.createElement('img');
                img.className = 'layer';
                img.alt = decodeURIComponent(name);
                wrapper.appendChild(img);
                loadWithFallback(img, name, 0);
            });

            const noHighlight = name => name.startsWith('base') || name.includes('text') || name.includes('noselect');

            const hitLayers = [...wrapper.querySelectorAll('.layer')]
                .filter(el => !noHighlight(imgName(el).toLowerCase()))
                .reverse();

            const HIT_MAX_DIM = 300; // hit-test canvases are downscaled to this size for performance
            const hitScale = Math.min(1, HIT_MAX_DIM / Math.max(W, H));
            const hitW = Math.max(1, Math.round(W * hitScale));
            const hitH = Math.max(1, Math.round(H * hitScale));

            const entries = hitLayers.map(el => {
                const canvas = document.createElement('canvas');
                canvas.width = hitW; canvas.height = hitH;
                return {
                    el,
                    ctx: canvas.getContext('2d', { willReadFrequently: true }),
                    ready: false,
                };
            });

            await Promise.all(entries.map(entry => new Promise(resolve => {
                const img = entry.el;
                const paint = () => { paintContained(entry.ctx, img, hitW, hitH); entry.ready = true; resolve(); };
                img.complete && img.naturalWidth ? paint() : img.addEventListener('load', paint);
            })));

            function hitAt(mx, my) {
                const sx = mx * hitScale, sy = my * hitScale;
                for (const e of entries)
                    if (e.ready && alpha(e.ctx, sx, sy) > 8) return e.el;
                return null;
            }

            const OUTLINE_WIDTH = 2; // px — change to adjust highlight border thickness
            const d = OUTLINE_WIDTH, hh = Math.round(d / 2);
            const OUTLINE =
                `drop-shadow(${d}px 0 0 white) drop-shadow(-${d}px 0 0 white) ` +
                `drop-shadow(0 ${d}px 0 white) drop-shadow(0 -${d}px 0 white) ` +
                `drop-shadow(${hh}px ${hh}px 0 white) drop-shadow(-${hh}px -${hh}px 0 white) ` +
                `drop-shadow(${hh}px -${hh}px 0 white) drop-shadow(-${hh}px ${hh}px 0 white)`;

            const allLayers = [...wrapper.querySelectorAll('.layer')];
            let active = null;

            function setActive(hit) {
                if (hit === active) return;
                if (active) {
                    active.style.filter = 'none';
                    active.classList.remove('active');
                }
                if (hit) {
                    hit.style.filter = OUTLINE;
                    hit.classList.add('active');
                }
                active = hit;
            }

            let rafPending = false;
            let pendingHit = null;
            let pendingCount = 0;
            const SWITCH_DELAY_FRAMES = 3;

            wrapper.addEventListener('mousemove', e => {
                const r = wrapper.getBoundingClientRect();
                const hit = hitAt(e.clientX - r.left, e.clientY - r.top);

                if (hit === active) {
                    pendingHit = null;
                    pendingCount = 0;
                    return;
                }

                if (hit !== pendingHit) {
                    pendingHit = hit;
                    pendingCount = 0;
                }
                pendingCount++;

                if (pendingCount < SWITCH_DELAY_FRAMES) return;
                if (rafPending) return;
                rafPending = true;
                requestAnimationFrame(() => {
                    rafPending = false;
                    setActive(pendingHit);
                });
            });

            function handleTap(clientX, clientY) {
                const r = wrapper.getBoundingClientRect();
                const hit = hitAt(clientX - r.left, clientY - r.top);
                if (!hit) return;
                const name = imgName(hit);
                console.log(name);

                if (namesToLink[name]) {
                    window.location.href = namesToLink[name];
                } else if (name in openRandomPopup) {
                    showRandomPopup();
                } else if (name in scrollDown) {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }
            }

            wrapper.addEventListener('click', e => {
                handleTap(e.clientX, e.clientY);
            });

            wrapper.addEventListener('touchstart', e => {
                const r = wrapper.getBoundingClientRect();
                const t = e.touches[0];
                const hit = hitAt(t.clientX - r.left, t.clientY - r.top);
                setActive(hit);
            }, { passive: true });

            wrapper.addEventListener('touchend', e => {
                const t = e.changedTouches[0];
                handleTap(t.clientX, t.clientY);
            });

            wrapper.addEventListener('mouseleave', () => {
                setActive(null);
            });
        }

        init().catch(err => console.error('Failed to load images:', err));
    </script>

</body>

</html>
